<style>
:root {
  --bg: #f0f2f5;
  --card-bg: #fff;
  --text: #1a1a2e;
  --text-secondary: #555;
  --text-muted: #999;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-light: #eff6ff;
  --accent-glow: rgba(37,99,235,.15);
  --border: #e8e8e8;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 2px 8px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.08);
  --shadow-hover: 0 4px 16px rgba(0,0,0,.1);
  --badge-bg: #f5f5f5;
  --sidebar-bg: #fff;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-pill: 100px;
  --transition: .2s cubic-bezier(.4,0,.2,1);
  --sidebar-w: 200px;
  --rightbar-w: 220px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1117;
    --card-bg: #181b25;
    --text: #e8e8f0;
    --text-secondary: #a0a0b8;
    --text-muted: #666680;
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
    --accent-light: #172554;
    --accent-glow: rgba(59,130,246,.12);
    --border: #2a2d3a;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.2);
    --shadow: 0 2px 8px rgba(0,0,0,.25);
    --shadow-lg: 0 8px 24px rgba(0,0,0,.3);
    --shadow-hover: 0 4px 16px rgba(0,0,0,.35);
    --badge-bg: #2a2d3a;
    --sidebar-bg: #181b25;
  }
  .brand-logo [fill="#888"] { fill: #666680; }
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
}

::-webkit-scrollbar{width:6px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ===== Layout ===== */
.layout{
  display:flex;min-height:100vh;
}

/* ===== Left sidebar ===== */
.sidebar-left{
  position:sticky;top:0;height:100vh;
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;
}
.sidebar-left-inner{padding:16px 14px;flex:1;display:flex;flex-direction:column;gap:14px}

.brand{
  padding-bottom:12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;
}
.brand-logo{display:block;height:auto}

.sidebar-label{
  font-size:10px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:6px;
}

/* Date nav */
.date-nav{display:flex;flex-direction:column;gap:3px}
.date-nav a{
  padding:5px 10px;
  background:transparent;border-radius:var(--radius-sm);
  font-size:12px;font-weight:500;color:var(--text-secondary);
  text-decoration:none;border:1.5px solid transparent;
  transition:all var(--transition);display:block;
}
.date-nav a:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.date-nav a.active{
  background:linear-gradient(135deg,var(--accent),#1e40af);
  color:#fff;border-color:transparent;
  box-shadow:0 2px 8px var(--accent-glow);
}
.nav-more{position:relative}
.nav-more-btn{
  width:100%;padding:5px 10px;background:transparent;
  border-radius:var(--radius-sm);font-size:12px;font-weight:500;
  color:var(--text-secondary);border:1.5px solid var(--border);
  cursor:pointer;transition:all var(--transition);
  display:flex;align-items:center;gap:4px;text-align:left;
}
.nav-more-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-dropdown{
  display:none;margin-top:3px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--card-bg);box-shadow:var(--shadow);
  max-height:200px;overflow-y:auto;
  animation:fadeSlideUp .15s ease;
}
.nav-dropdown a{
  display:block;padding:5px 10px;font-size:11px;
  color:var(--text-secondary);text-decoration:none;
  border-bottom:1px solid var(--border);transition:all .15s;
}
.nav-dropdown a:last-child{border-bottom:none}
.nav-dropdown a:hover{background:var(--accent-light);color:var(--accent)}
.nav-dropdown a.active{color:var(--accent);font-weight:700}
.nav-more:hover .nav-dropdown{display:block}

/* Topic tabs */
.topic-tabs{display:flex;flex-direction:column;gap:4px}
.topic-tab{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;background:transparent;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:12px;font-weight:500;color:var(--text-secondary);
  cursor:pointer;transition:all var(--transition);
  position:relative;overflow:hidden;width:100%;text-align:left;
}
.topic-tab::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent),#1e40af);
  opacity:0;transition:opacity var(--transition);
}
.topic-tab.active{color:#fff;border-color:transparent;box-shadow:0 2px 12px var(--accent-glow)}
.topic-tab.active::before{opacity:1}
.topic-tab span{position:relative;z-index:1}
.topic-tab:hover:not(.active){border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* ===== Right sidebar ===== */
.sidebar-right{
  position:sticky;top:0;height:100vh;
  width:var(--rightbar-w);flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid var(--border);
  overflow-y:auto;overflow-x:hidden;
}
.sidebar-right-inner{padding:16px 14px;display:flex;flex-direction:column;gap:14px}

/* Search */
.search-bar{position:relative;width:100%}
.search-bar input{
  width:100%;padding:7px 10px 7px 30px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:12px;background:var(--bg);color:var(--text);
  outline:none;transition:all var(--transition);
}
.search-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);background:var(--card-bg)}
.search-bar input::placeholder{color:var(--text-muted)}
.search-bar svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);transition:color var(--transition)}
.search-bar input:focus + svg,.search-bar:focus-within svg{color:var(--accent)}
.search-count{font-size:10px;color:var(--text-muted);white-space:nowrap;padding:2px 6px;background:var(--bg);border-radius:var(--radius-sm);font-weight:500;display:inline-block;margin-top:4px}

/* Filters */
.filter-list{display:flex;flex-direction:column;gap:3px}
.filter-btn{
  padding:6px 12px;
  background:transparent;border-radius:var(--radius-sm);
  font-size:12px;font-weight:500;color:var(--text-secondary);
  border:1.5px solid transparent;cursor:pointer;
  transition:all var(--transition);text-align:left;
  display:flex;align-items:center;gap:5px;
}
.filter-btn.active{
  background:linear-gradient(135deg,var(--accent),#1e40af);
  color:#fff;border-color:transparent;
  box-shadow:0 2px 8px var(--accent-glow);
}
.filter-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* ===== Main content ===== */
.main{
  flex:1;min-width:0;
  padding:16px 24px;
  contain:layout style;
}

.card{
  background:var(--card-bg);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow-sm);
  border:1px solid var(--border);
  margin-bottom:16px;
  transition:box-shadow var(--transition);
  content-visibility:auto;
  contain-intrinsic-size:auto 120px;
}
.card:hover{box-shadow:var(--shadow-hover)}
.card h3{
  font-size:15px;font-weight:700;margin:0 0 10px;
  display:flex;align-items:center;gap:8px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}
.card h3 .count{
  font-size:11px;font-weight:500;color:var(--text-muted);
  background:var(--bg);padding:2px 8px;border-radius:var(--radius-sm);
  margin-left:auto;
}
.news-list{list-style:none;padding:0}
.news-item{
  padding:8px 0;border-bottom:1px solid transparent;
  transition:border-bottom-color var(--transition);
}
.news-item:last-child{border-bottom:none}
.news-item:not(:last-child){border-bottom-color:var(--border)}
.news-item a{
  color:var(--text);text-decoration:none;font-size:13.5px;
  transition:color var(--transition);line-height:1.6;
}
.news-item a:hover{color:var(--accent)}
.news-item a:visited{color:var(--text-muted)}
.source-tag{
  display:inline-flex;align-items:center;
  background:var(--badge-bg);color:var(--text-muted);
  font-size:10px;font-weight:500;
  padding:2px 8px;border-radius:var(--radius-sm);
  white-space:nowrap;margin-left:6px;vertical-align:middle;
}

/* Empty state */
.empty{text-align:center;padding:64px 20px;color:var(--text-muted)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.6}
.empty p{font-size:14px}

/* Footer */
.footer{
  text-align:center;padding:20px;
  color:var(--text-muted);font-size:11px;
  border-top:1px solid var(--border);margin-top:12px;
}
.footer a{color:var(--accent);text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}

/* Back to top */
.back-top{
  position:fixed;bottom:24px;right:24px;
  width:40px;height:40px;border-radius:50%;
  background:var(--accent);color:#fff;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px var(--accent-glow);
  opacity:0;pointer-events:none;z-index:50;
  transition:opacity .2s ease;
  will-change:opacity;
}
.back-top.visible{opacity:1;pointer-events:auto}
.back-top:hover{box-shadow:0 6px 20px var(--accent-glow)}

/* Skeleton */
.skeleton{animation:pulse 1.5s ease-in-out infinite}
.skeleton-card{
  background:var(--card-bg);border-radius:var(--radius);
  padding:16px;margin-bottom:16px;border:1px solid var(--border);
}
.skeleton-line{height:14px;background:var(--border);border-radius:6px;margin-bottom:10px}
.skeleton-line.short{width:60%}
.skeleton-line.medium{width:80%}
.skeleton-line.title{width:45%;height:18px;margin-bottom:16px}

/* Animations */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:cardIn .25s ease both}

/* ===== Mobile header ===== */
.mobile-header{
  display:none;position:sticky;top:0;z-index:100;
  background:var(--sidebar-bg);border-bottom:1px solid var(--border);
  padding:10px 14px;align-items:center;gap:8px;
}
.mobile-brand{
  display:flex;align-items:center;flex-shrink:0;
}
.hamburger{
  width:36px;height:36px;
  background:var(--card-bg);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);flex-shrink:0;
}
.hamburger:hover{border-color:var(--accent);color:var(--accent)}
.mobile-search{flex:1;position:relative}
.mobile-search input{
  width:100%;padding:7px 12px 7px 30px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:13px;background:var(--bg);color:var(--text);outline:none;
}
.mobile-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.mobile-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted)}

.mobile-bar{
  display:none;gap:6px;overflow-x:auto;padding:8px 14px;
  border-bottom:1px solid var(--border);background:var(--sidebar-bg);
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.mobile-bar::-webkit-scrollbar{display:none}
.mobile-bar .topic-tab,
.mobile-bar .filter-btn{flex-shrink:0;padding:4px 12px;font-size:11px;border-radius:var(--radius-pill);width:auto}
.mobile-bar a{
  flex-shrink:0;padding:4px 12px;
  background:var(--card-bg);border-radius:var(--radius-pill);
  font-size:11px;font-weight:500;color:var(--text-secondary);
  text-decoration:none;border:1.5px solid var(--border);
  transition:all var(--transition);
}
.mobile-bar a:hover{border-color:var(--accent);color:var(--accent)}
.mobile-bar a.active{
  background:linear-gradient(135deg,var(--accent),#1e40af);
  color:#fff;border-color:transparent;
}

.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);z-index:99;backdrop-filter:blur(2px);
}
.sidebar-overlay.show{display:block}

/* ===== Responsive ===== */
@media (max-width:1024px){
  .sidebar-right{display:none}
  .mobile-bar.right-bar{display:flex}
  :root{--rightbar-w:0}
}
@media (max-width:768px){
  .sidebar-left{transform:translateX(-100%);position:fixed;z-index:100}
  .sidebar-left.open{transform:translateX(0)}
  .mobile-header{display:flex}
  .mobile-bar.top-bar{display:flex}
  .layout{flex-direction:column}
  .main{padding:12px 14px}
  .sidebar-overlay.show{display:block}
}
@media (max-width:480px){
  .mobile-bar .topic-tab{padding:3px 10px;font-size:10px}
  .mobile-bar .filter-btn{padding:3px 10px;font-size:10px}
  .mobile-bar a{padding:3px 10px;font-size:10px}
}
</style>
</head>

<script>
const TOPICS = [
  { id: 'finance', name: '全球金融', icon: '💹', dataDir: 'data/finance' },
  { id: 'social-science', name: '社科前沿', icon: '🎓', dataDir: 'data/social-science' },
  { id: 'xiaomi', name: '小米资讯', icon: '📱', dataDir: 'data/xiaomi' },
];

let currentTopic = TOPICS[0];
let currentDay = null;          // 当天的 { date, sections }
let currentDates = [];          // index 中的日期列表
let currentSelectedIdx = 0;     // 当前选中的日期索引
let activeCategory = 'all';
let searchQuery = '';

// ===== Cache =====
const topicCache = new Map();   // topicId → { index, dayData: Map<date, json> }
const _prefetching = new Set();

// ===== DOM refs =====
const $ = id => document.getElementById(id);
const $content = $('content');
const $dateNav = $('dateNav');
const $filters = $('filters');
const $searchInput = $('searchInput');
const $mobileSearchInput = $('mobileSearchInput');
const $searchCount = $('searchCount');
const $topicTabs = $('topicTabs');
const $mobileTopicBar = $('mobileTopicBar');
const $mobileFilterBar = $('mobileFilterBar');
const $sidebarLeft = $('sidebarLeft');
const $sidebarOverlay = $('sidebarOverlay');
const $hamburger = $('hamburger');

// ===== Mobile sidebar toggle =====
$hamburger.addEventListener('click', () => {
  $sidebarLeft.classList.toggle('open');
  $sidebarOverlay.classList.toggle('show');
});
$sidebarOverlay.addEventListener('click', () => {
  $sidebarLeft.classList.remove('open');
  $sidebarOverlay.classList.remove('show');
});

// ===== Topic switching =====
function switchTopic(topicId) {
  currentTopic = TOPICS.find(t => t.id === topicId) || TOPICS[0];
  activeCategory = 'all';
  searchQuery = '';
  $searchInput.value = '';
  $mobileSearchInput.value = '';
  $searchCount.textContent = '';

  document.querySelectorAll('.topic-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.topic === topicId);
  });

  $sidebarLeft.classList.remove('open');
  $sidebarOverlay.classList.remove('show');

  showSkeleton();
  loadData();
}

function buildTopicTabs() {
  const tabHtml = TOPICS.map(t =>
    `<button class="topic-tab ${t.id === currentTopic.id ? 'active' : ''}" data-topic="${t.id}" onclick="switchTopic('${t.id}')" onmouseenter="prefetchTopic('${t.id}')"><span>${t.icon} ${t.name}</span></button>`
  ).join('');
  $topicTabs.innerHTML = tabHtml;
  $mobileTopicBar.innerHTML = tabHtml;
}

function showSkeleton() {
  $content.innerHTML = `
    <div class="skeleton-card skeleton"><div class="skeleton-line title"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>
    <div class="skeleton-card skeleton"><div class="skeleton-line title"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div></div>
  `;
}

// ===== 日期工具 =====
function getTodayStr() {
  return new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Shanghai' });
}

function getAdjacentDate(dateStr, offset) {
  const d = new Date(dateStr + 'T00:00:00+08:00');
  d.setDate(d.getDate() + offset);
  return d.toLocaleDateString('sv-SE', { timeZone: 'Asia/Shanghai' });
}

// ===== Prefetch =====
async function prefetchTopic(topicId) {
  if (_prefetching.has(topicId) || topicCache.has(topicId)) return;
  _prefetching.add(topicId);
  const topic = TOPICS.find(t => t.id === topicId);
  if (!topic) return;
  const dataDir = topic.dataDir;
  try {
    const cached = { index: null, dayData: new Map() };
    topicCache.set(topicId, cached);

    // 并行：猜日期 + index.json
    const today = getTodayStr();
    const indexPromise = fetch(`${dataDir}/index.json`);
    const todayPromise = fetch(`${dataDir}/${today}.json`);

    try {
      const todayRes = await todayPromise;
      if (todayRes.ok) cached.dayData.set(today, await todayRes.json());
    } catch {}

    try {
      const indexRes = await indexPromise;
      if (indexRes.ok) cached.index = await indexRes.json();
    } catch {}

    // index 加载后补最新一天
    if (cached.index?.days?.[0]?.date && !cached.dayData.has(cached.index.days[0].date)) {
      const firstDate = cached.index.days[0].date;
      const dayRes = await fetch(`${dataDir}/${firstDate}.json`);
      if (dayRes.ok) cached.dayData.set(firstDate, await dayRes.json());
    }
  } catch {} finally {
    _prefetching.delete(topicId);
  }
}

async function preloadOtherTopics() {
  const others = TOPICS.filter(t => t.id !== currentTopic.id && !topicCache.has(t.id));
  await Promise.allSettled(others.map(t => prefetchTopic(t.id)));
}

// ===== 并行加载 =====
async function loadData() {
  const dataDir = currentTopic.dataDir;
  const cacheKey = currentTopic.id;
  let cached = topicCache.get(cacheKey);

  try {
    // 1. 有缓存 → 快速路径
    if (cached?.index) {
      const firstDate = cached.index.days[0]?.date;
      if (!firstDate) throw new Error('empty index');
      currentDates = cached.index.days.map(d => d.date);
      currentSelectedIdx = 0;

      let dayJson;
      if (cached.dayData.has(firstDate)) {
        dayJson = cached.dayData.get(firstDate);
      } else {
        const dayRes = await fetch(`${dataDir}/${firstDate}.json`);
        if (!dayRes.ok) throw new Error('day load failed');
        dayJson = await dayRes.json();
        cached.dayData.set(firstDate, dayJson);
      }
      currentDay = dayJson;
      buildDateNav(); buildFilters(); renderContent();
      preloadOtherTopics();
      return;
    }

    // 2. 无缓存 → 并行猜日期 + 拉 index
    if (!cached) cached = { index: null, dayData: new Map() };
    topicCache.set(cacheKey, cached);

    const today = getTodayStr();
    const yesterday = getAdjacentDate(today, -1);

    const todayPromise = fetch(`${dataDir}/${today}.json`);
    const indexPromise = fetch(`${dataDir}/index.json`);
    const yesterdayPromise = fetch(`${dataDir}/${yesterday}.json`);

    // 2a. 先等今天的数据 → 立即渲染
    let rendered = false;
    try {
      const todayRes = await todayPromise;
      if (todayRes.ok) {
        const todayJson = await todayRes.json();
        cached.dayData.set(today, todayJson);
        currentDay = todayJson;
        rendered = true;
      }
    } catch {}

    // 今天没数据？试昨天
    if (!rendered) {
      try {
        const ydRes = await yesterdayPromise;
        if (ydRes.ok) {
          const ydJson = await ydRes.json();
          cached.dayData.set(yesterday, ydJson);
          currentDay = ydJson;
          rendered = true;
        }
      } catch {}
    }

    // 2b. 等 index → 补全日期导航
    try {
      const indexRes = await indexPromise;
      if (indexRes.ok) {
        const index = await indexRes.json();
        cached.index = index;
        currentDates = index.days.map(d => d.date);

        if (rendered) {
          const todayIdx = currentDates.indexOf(today);
          const ydIdx = currentDates.indexOf(yesterday);
          currentSelectedIdx = todayIdx >= 0 ? todayIdx : (ydIdx >= 0 ? ydIdx : 0);
        }

        // 补缓存
        const firstDate = currentDates[0];
        if (firstDate && !cached.dayData.has(firstDate)) {
          const dayRes = await fetch(`${dataDir}/${firstDate}.json`);
          if (dayRes.ok) cached.dayData.set(firstDate, await dayRes.json());
        }

        buildDateNav();
      }
    } catch {}

    if (rendered) {
      buildFilters(); renderContent();
      preloadOtherTopics();
      return;
    }

    // 3. 全部失败
    currentDay = null;
    currentDates = [];
    showEmpty();

  } catch {
    currentDay = null;
    currentDates = [];
    showEmpty();
  }
}

function showEmpty() {
  $dateNav.innerHTML = '';
  $filters.innerHTML = '';
  $mobileFilterBar.innerHTML = '';
  $content.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>暂无数据，每日 9:00 自动更新</p></div>';
}

async function loadDay(date) {
  if (!date) return;
  const dataDir = currentTopic.dataDir;
  const cached = topicCache.get(currentTopic.id);
  try {
    let dayJson;
    if (cached?.dayData?.has(date)) {
      dayJson = cached.dayData.get(date);
    } else {
      const res = await fetch(`${dataDir}/${date}.json`);
      if (!res.ok) throw new Error();
      dayJson = await res.json();
      if (cached?.dayData) cached.dayData.set(date, dayJson);
    }
    currentDay = dayJson;
    currentSelectedIdx = currentDates.indexOf(date);
    buildFilters(); renderContent();
  } catch {
    $content.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>加载失败</p></div>';
  }
}

// ===== Search =====
let _searchTimer = null;
function debouncedSearch() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(onSearch, 200);
}
function onSearch() {
  const val = document.activeElement === $mobileSearchInput
    ? $mobileSearchInput.value : $searchInput.value;
  searchQuery = val.trim().toLowerCase();
  $searchInput.value = val;
  $mobileSearchInput.value = val;
  renderContent();
}

// ===== Category filter =====
function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderContent();
}

// ===== Date navigation =====
function showDate(idx) {
  const date = currentDates[idx];
  if (date) {
    activeCategory = 'all'; searchQuery = '';
    $searchInput.value = ''; $mobileSearchInput.value = '';
    $searchCount.textContent = '';
    loadDay(date);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function buildDateNav() {
  const dates = currentDates;
  const currentIdx = currentSelectedIdx;

  const RECENT = 5;
  const recentDates = dates.slice(0, RECENT);
  const olderDates = dates.slice(RECENT);

  let sidebarHtml = '';
  recentDates.forEach((dateStr, i) => {
    sidebarHtml += `<a href="#" class="${i === currentIdx ? 'active' : ''}" onclick="event.preventDefault();showDate(${i})">${dateStr}</a>`;
  });
  if (olderDates.length > 0) {
    const isOlderActive = currentIdx >= RECENT;
    sidebarHtml += `<div class="nav-more">
      <button class="nav-more-btn">${isOlderActive ? dates[currentIdx] + ' ▾' : '更早 ▾'}</button>
      <div class="nav-dropdown">
        ${olderDates.map((dateStr, i) => `<a href="#" class="${RECENT + i === currentIdx ? 'active' : ''}" onclick="event.preventDefault();showDate(${RECENT + i})">${dateStr}</a>`).join('')}
      </div>
    </div>`;
  }
  $dateNav.innerHTML = sidebarHtml;
}

// ===== Filters =====
function buildFilters() {
  if (!currentDay) { $filters.innerHTML = ''; $mobileFilterBar.innerHTML = ''; return; }

  const firstCat = currentDay.sections[0]?.title || 'all';
  if (activeCategory === 'all') activeCategory = firstCat;

  const filterHtml = `<button class="filter-btn ${activeCategory === 'all' ? 'active' : ''}" data-cat="all" onclick="setCategory('all')">全部</button>` +
    currentDay.sections.map(s => `<button class="filter-btn ${s.title === activeCategory ? 'active' : ''}" data-cat="${s.title}" onclick="setCategory('${s.title}')">${s.icon} ${s.title}</button>`).join('');
  $filters.innerHTML = filterHtml;
  $mobileFilterBar.innerHTML = filterHtml;
}

// ===== Render =====
function renderContent() {
  if (!currentDay) {
    $content.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>暂无数据</p></div>';
    $searchCount.textContent = '';
    return;
  }

  let sections = currentDay.sections;
  if (activeCategory !== 'all') sections = sections.filter(s => s.title === activeCategory);
  if (searchQuery) {
    sections = sections.map(s => ({
      ...s,
      items: s.items.filter(r =>
        r.title.toLowerCase().includes(searchQuery) ||
        (r.source || '').toLowerCase().includes(searchQuery)
      )
    })).filter(s => s.items.length > 0);
  }

  if (!sections.length) {
    const emptyMsg = searchQuery ? `未找到「${esc(searchQuery)}」相关的新闻` : '该分类暂无新闻';
    $content.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>${emptyMsg}</p></div>`;
    $searchCount.textContent = '';
    return;
  }

  let total = 0;
  let html = '';
  sections.forEach(s => {
    total += s.items.length;
    html += `<div class="card"><h3>${s.icon} ${s.title} <span class="count">${s.items.length} 条</span></h3><ul class="news-list">`;
    s.items.forEach(item => {
      const link = item.link
        ? `<a href="${esc(item.link)}" target="_blank" rel="noopener noreferrer">${highlightMatch(item.title)}</a>`
        : `<span>${highlightMatch(item.title)}</span>`;
      const src = item.source ? `<span class="source-tag">${esc(item.source)}</span>` : '';
      html += `<li class="news-item"><div>${link}${src}</div></li>`;
    });
    html += `</ul></div>`;
  });
  $content.innerHTML = html;
  $searchCount.textContent = searchQuery ? `${total} 条结果` : '';
}

// ===== Helpers =====
const _escEl = document.createElement('div');
function esc(s) { _escEl.textContent = s; return _escEl.innerHTML; }

function highlightMatch(text) {
  if (!searchQuery) return esc(text);
  const escaped = esc(text);
  const regex = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escaped.replace(regex, '<mark style="background:var(--accent-glow);color:var(--accent);padding:0 2px;border-radius:2px">$1</mark>');
}

// ===== Back to top =====
const backTop = $('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

// ===== Keyboard shortcuts =====
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    (window.innerWidth <= 768 ? $mobileSearchInput : $searchInput).focus();
  }
  if (e.key === 'Escape') {
    if (document.activeElement === $searchInput || document.activeElement === $mobileSearchInput) {
      $searchInput.value = ''; $mobileSearchInput.value = '';
      document.activeElement.blur();
      searchQuery = ''; $searchCount.textContent = '';
      renderContent();
    }
    $sidebarLeft.classList.remove('open');
    $sidebarOverlay.classList.remove('show');
  }
  if (document.activeElement.tagName !== 'INPUT') {
    const maxIdx = currentDates.length - 1;
    if (e.key === 'ArrowLeft' && currentSelectedIdx < maxIdx) { showDate(currentSelectedIdx + 1); }
    if (e.key === 'ArrowRight' && currentSelectedIdx > 0) { showDate(currentSelectedIdx - 1); }
  }
});

// ===== Init =====
buildTopicTabs();
loadData();
</script>
</body>
</html>

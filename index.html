<html lang="zh-CN">
<head>

<meta property="og:title" content="纳思 - 海纳百思">
<meta property="og:description" content="每日自动聚合全球金融、社科前沿、科技资讯">
<meta property="og:url" content="https://nase.me/">

<style>
:root {
  --bg: #f0f2f5;
  --card-bg: #fff;
  --text: #1a1a2e;
  --text-secondary: #555;
  --text-muted: #999;
  --accent: #ff6b2b;
  --accent-hover: #e85d20;
  --accent-light: #fff5f0;
  --accent-glow: rgba(255,107,43,.15);
  --border: #e8e8e8;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 2px 8px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.08);
  --shadow-hover: 0 4px 16px rgba(0,0,0,.1);
  --badge-bg: #f5f5f5;
  --toolbar-bg: rgba(255,255,255,.85);
  --glass: rgba(255,255,255,.7);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-pill: 100px;
  --transition: .2s cubic-bezier(.4,0,.2,1);
  --spring: .35s cubic-bezier(.34,1.56,.64,1);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f14;
    --card-bg: #1a1a24;
    --text: #e8e8f0;
    --text-secondary: #a0a0b8;
    --text-muted: #666680;
    --accent: #ff7b3a;
    --accent-hover: #ff9258;
    --accent-light: #2a1a10;
    --accent-glow: rgba(255,123,58,.12);
    --border: #2a2a3a;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.2);
    --shadow: 0 2px 8px rgba(0,0,0,.25);
    --shadow-lg: 0 8px 24px rgba(0,0,0,.3);
    --shadow-hover: 0 4px 16px rgba(0,0,0,.35);
    --badge-bg: #2a2a3a;
    --toolbar-bg: rgba(26,26,36,.9);
    --glass: rgba(26,26,36,.75);
  }
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:6px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ===== Toolbar (Glass) ===== */
.toolbar{
  background:var(--toolbar-bg);
  backdrop-filter:blur(16px) saturate(1.4);
  -webkit-backdrop-filter:blur(16px) saturate(1.4);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  will-change:transform;
}
.toolbar-inner{max-width:1200px;margin:0 auto;padding:12px 20px}

/* Row 1 */
.toolbar-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{
  display:flex;align-items:center;gap:8px;
  font-size:17px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),#ff3d7f);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;white-space:nowrap;letter-spacing:-.3px;
}
.brand-icon{font-size:22px;-webkit-text-fill-color:initial}
.topic-tabs{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.topic-tab{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 16px;background:transparent;
  border:1.5px solid var(--border);border-radius:var(--radius-pill);
  font-size:13px;font-weight:500;color:var(--text-secondary);
  cursor:pointer;transition:all var(--transition);
  position:relative;overflow:hidden;
}
.topic-tab::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent),#ff3d7f);
  opacity:0;transition:opacity var(--transition);
}
.topic-tab.active{
  color:#fff;border-color:transparent;
  box-shadow:0 2px 12px var(--accent-glow);
}
.topic-tab.active::before{opacity:1}
.topic-tab span{position:relative;z-index:1}
.topic-tab:hover:not(.active){border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

.rss-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 14px;
  background:var(--accent-light);border:1.5px solid transparent;
  border-radius:var(--radius-pill);font-size:12px;font-weight:600;
  color:var(--accent);cursor:pointer;
  transition:all var(--transition);text-decoration:none;white-space:nowrap;
}
.rss-btn:hover{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow)}
.rss-btn svg{flex-shrink:0}
.rss-tooltip{position:relative}
.rss-tooltip .rss-popup{
  display:none;position:absolute;top:calc(100% + 8px);right:0;
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 16px;
  box-shadow:var(--shadow-lg);z-index:200;
  white-space:nowrap;font-size:12px;
  animation:fadeSlideUp .2s ease;
}
.rss-tooltip .rss-popup code{
  display:block;margin-top:6px;color:var(--accent);
  word-break:break-all;max-width:320px;white-space:normal;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;
  background:var(--bg);padding:6px 8px;border-radius:6px;
}
.rss-tooltip:hover .rss-popup{display:block}

/* Row 2 */
.toolbar-bottom{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.filters{display:flex;gap:6px;flex:1;flex-wrap:wrap;padding:2px 0;min-width:0}
.filter-btn{
  white-space:nowrap;padding:5px 14px;
  background:transparent;border-radius:var(--radius-pill);
  font-size:12px;font-weight:500;color:var(--text-secondary);
  border:1.5px solid var(--border);cursor:pointer;
  transition:all var(--transition);
}
.filter-btn.active{
  background:linear-gradient(135deg,var(--accent),#ff3d7f);
  color:#fff;border-color:transparent;
  box-shadow:0 2px 8px var(--accent-glow);
}
.filter-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.toolbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.search-bar{position:relative;width:160px;flex-shrink:0}
.search-bar input{
  width:100%;padding:5px 10px 5px 30px;
  border:1.5px solid var(--border);border-radius:var(--radius-pill);
  font-size:12px;background:var(--bg);color:var(--text);
  outline:none;transition:all var(--transition);
}
.search-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);background:var(--card-bg);width:220px}
.search-bar input::placeholder{color:var(--text-muted)}
.search-bar svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);transition:color var(--transition)}
.search-bar input:focus + svg,.search-bar:focus-within svg{color:var(--accent)}
.search-count{font-size:10px;color:var(--text-muted);white-space:nowrap;padding:2px 6px;background:var(--bg);border-radius:var(--radius-sm);font-weight:500}

/* Date nav */
.nav{display:flex;gap:6px;align-items:center;padding:12px 0;flex-wrap:wrap}
.nav a{
  white-space:nowrap;padding:5px 14px;
  background:var(--card-bg);border-radius:var(--radius-pill);
  font-size:12px;font-weight:500;color:var(--text-secondary);
  text-decoration:none;border:1.5px solid var(--border);
  transition:all var(--transition);
}
.nav a:hover{border-color:var(--accent);color:var(--accent)}
.nav a.active{
  background:linear-gradient(135deg,var(--accent),#ff3d7f);
  color:#fff;border-color:transparent;
  box-shadow:0 2px 8px var(--accent-glow);
}
.nav-more{position:relative;display:inline-block}
.nav-more-btn{
  padding:5px 12px;background:var(--card-bg);
  border-radius:var(--radius-pill);font-size:12px;font-weight:500;
  color:var(--text-secondary);border:1.5px solid var(--border);
  cursor:pointer;transition:all var(--transition);
  display:inline-flex;align-items:center;gap:4px;
}
.nav-more-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-dropdown{
  display:none;position:absolute;top:calc(100% + 6px);left:0;
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);
  z-index:200;min-width:140px;max-height:260px;overflow-y:auto;
  animation:fadeSlideUp .15s ease;
}
.nav-dropdown a{
  display:block;padding:8px 16px;font-size:12px;
  color:var(--text-secondary);text-decoration:none;
  border-bottom:1px solid var(--border);transition:all .15s;
  border-radius:0;border:none;
}
.nav-dropdown a:last-child{border-bottom:none}
.nav-dropdown a:hover{background:var(--accent-light);color:var(--accent)}
.nav-dropdown a.active{color:var(--accent);font-weight:700}
.nav-more:hover .nav-dropdown{display:block}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:16px 20px}

/* Cards */
.cards-grid{columns:2;column-gap:20px}
.cards-full{columns:1}
.card{
  background:var(--card-bg);border-radius:var(--radius);
  padding:20px;box-shadow:var(--shadow-sm);
  border:1px solid var(--border);
  break-inside:avoid;margin-bottom:16px;
  transition:all var(--transition);
  contain:layout style;
}
.card:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.card h3{
  font-size:15px;font-weight:700;margin:0 0 12px;
  display:flex;align-items:center;gap:8px;
  padding-bottom:10px;border-bottom:1px solid var(--border);
}
.card h3 .count{
  font-size:11px;font-weight:500;color:var(--text-muted);
  background:var(--bg);padding:2px 8px;border-radius:var(--radius-sm);
  margin-left:auto;
}
.news-list{list-style:none;padding:0}
.news-list.news-grid{columns:2;column-gap:16px}
.news-list.news-grid .news-item{break-inside:avoid}
.news-item{
  padding:8px 0;border-bottom:1px solid transparent;
  transition:all var(--transition);
}
.news-item:last-child{border-bottom:none}
.news-item:not(:last-child){border-bottom-color:var(--border)}
.news-item a{
  color:var(--text);text-decoration:none;font-size:13.5px;
  transition:color var(--transition);line-height:1.6;
  display:inline;
}
.news-item a:hover{color:var(--accent)}
.news-item a:visited{color:var(--text-muted)}
.news-subtitle{font-size:11px;color:var(--text-muted);margin-top:2px;font-style:italic;opacity:.8}
.source-tag{
  display:inline-flex;align-items:center;
  background:var(--badge-bg);color:var(--text-muted);
  font-size:10px;font-weight:500;
  padding:2px 8px;border-radius:var(--radius-sm);
  white-space:nowrap;margin-left:6px;vertical-align:middle;
}

/* Empty state */
.empty{text-align:center;padding:64px 20px;color:var(--text-muted)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.6}
.empty p{font-size:14px}

/* Footer */
.footer{
  text-align:center;padding:24px 20px;
  color:var(--text-muted);font-size:11px;
  border-top:1px solid var(--border);margin-top:20px;
}
.footer a{color:var(--accent);text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}

/* Back to top */
.back-top{
  position:fixed;bottom:24px;right:24px;
  width:40px;height:40px;border-radius:50%;
  background:var(--accent);color:#fff;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px var(--accent-glow);
  opacity:0;transform:translateY(12px);
  transition:all .3s ease;pointer-events:none;z-index:50;
}
.back-top.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.back-top:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--accent-glow)}

/* Skeleton loading */
.skeleton{animation:pulse 1.5s ease-in-out infinite}
.skeleton-card{
  background:var(--card-bg);border-radius:var(--radius);
  padding:20px;margin-bottom:16px;border:1px solid var(--border);
}
.skeleton-line{
  height:14px;background:var(--border);border-radius:6px;
  margin-bottom:10px;
}
.skeleton-line.short{width:60%}
.skeleton-line.medium{width:80%}
.skeleton-line.title{width:45%;height:18px;margin-bottom:16px}

/* Animations */
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.5}
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.card{animation:cardIn .35s ease both}
.card:nth-child(2){animation-delay:.05s}
.card:nth-child(3){animation-delay:.1s}
.card:nth-child(4){animation-delay:.12s}
.card:nth-child(5){animation-delay:.15s}
.card:nth-child(6){animation-delay:.18s}

/* Responsive */
@media (max-width:768px){
  .cards-grid{columns:1}
  .news-list.news-grid{columns:1}
  .toolbar-top{gap:8px}
  .rss-btn .rss-label{display:none}
  .toolbar-right{order:10;width:100%;justify-content:flex-end}
  .search-bar{width:140px}
  .search-bar input:focus{width:180px}
  .toolbar-inner{padding:10px 14px}
  .container{padding:12px 14px}
  .brand{font-size:15px}
}
@media (max-width:480px){
  .topic-tab{padding:5px 12px;font-size:12px}
  .nav a{padding:4px 10px;font-size:11px}
}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-inner">
    <div class="toolbar-top">
      <div class="brand"><span class="brand-icon">📰</span> 纳思</div>
      <div class="topic-tabs" id="topicTabs"></div>
      <div class="rss-tooltip">
        <a class="rss-btn" href="#" id="rssLink" target="_blank">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="6.18" cy="17.82" r="2.18"/><path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83c0-8.59-6.97-15.56-15.56-15.56zm0 5.66v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z"/></svg>
          <span class="rss-label">RSS</span>
        </a>
        <div class="rss-popup">
          <div style="display:flex;align-items:center;gap:8px">
            <code id="rss-url"></code>
            <button class="copy-btn" onclick="copyRSS()" style="background:var(--accent);color:#fff;border:none;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:600;transition:all var(--transition)">复制</button>
          </div>
        </div>
      </div>
    </div>
    <div class="toolbar-bottom">
      <div class="filters" id="filters"></div>
      <div class="toolbar-right">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="搜索..." oninput="debouncedSearch()" aria-label="搜索新闻">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </div>
        <span id="searchCount" class="search-count"></span>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="nav" id="nav"></div>
  <div id="content">
    <div class="skeleton-card skeleton"><div class="skeleton-line title"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>
    <div class="skeleton-card skeleton"><div class="skeleton-line title"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div></div>
  </div>
</div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="回到顶部">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m18 15-6-6-6 6"/></svg>
</button>

<div class="footer">
  纳思 · 海纳百思 · 数据来源于公开网络 · 新闻版权归原作者/来源所有
</div>

<script>
const TOPICS = [
  { id: 'finance', name: '全球金融', icon: '💹', dataFile: 'data/finance.json', feedFile: 'feed-finance.xml' },
  { id: 'social-science', name: '社科前沿', icon: '🎓', dataFile: 'data/social-science.json', feedFile: 'feed-social-science.xml' },
  { id: 'xiaomi', name: '小米资讯', icon: '📱', dataFile: 'data/xiaomi.json', feedFile: 'feed.xml' },
];

let currentTopic = TOPICS[0];
let allData = [];
let currentDateIdx = 0;
let activeCategory = 'all';
let searchQuery = '';

// ===== Topic switching =====
function switchTopic(topicId) {
  currentTopic = TOPICS.find(t => t.id === topicId) || TOPICS[0];
  activeCategory = 'all';
  searchQuery = '';
  $searchInput.value = '';
  $searchCount.textContent = '';

  document.querySelectorAll('.topic-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.topic === topicId);
  });

  const feedUrl = 'https://nase.me/' + currentTopic.feedFile;
  $rssUrl.textContent = feedUrl;
  $rssLink.href = feedUrl;

  showSkeleton();
  loadData();
}

function buildTopicTabs() {
  $topicTabs.innerHTML = TOPICS.map(t =>
    `<button class="topic-tab ${t.id === currentTopic.id ? 'active' : ''}" data-topic="${t.id}" onclick="switchTopic('${t.id}')"><span>${t.icon} ${t.name}</span></button>`
  ).join('');
}

function showSkeleton() {
  $content.innerHTML = `
    <div class="skeleton-card skeleton"><div class="skeleton-line title"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div>
    <div class="skeleton-card skeleton"><div class="skeleton-line title"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div></div>
  `;
}

// ===== Data loading =====
async function loadData() {
  try {
    const dataDir = currentTopic.dataFile.replace('.json', '');
    const indexRes = await fetch(`${dataDir}/index.json`);
    if (!indexRes.ok) throw new Error('no index');
    const index = await indexRes.json();
    window._splitIndex = index;

    const firstDate = index.days[0]?.date;
    if (!firstDate) throw new Error('empty index');

    // 索引到了，立即构建日期导航（不等首日数据）
    window._splitSelectedIdx = 0;
    buildDateNav();

    // 加载首日数据
    const dayRes = await fetch(`${dataDir}/${firstDate}.json`);
    if (!dayRes.ok) throw new Error('day load failed');
    allData = [await dayRes.json()];
    currentDateIdx = 0;
    buildFilters(); renderContent();
  } catch {
    window._splitIndex = null;
    try {
      const res = await fetch(currentTopic.dataFile);
      if (!res.ok) throw new Error();
      allData = await res.json();
      currentDateIdx = 0;
      buildDateNav(); buildFilters(); renderContent();
    } catch {
      allData = [];
      $nav.innerHTML = '';
      $stats.innerHTML = '';
      $filters.innerHTML = '';
      $content.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>暂无数据，每日 9:00 自动更新</p></div>';
    }
  }
}

async function loadDayFromSplit(date) {
  if (!date || !window._splitIndex) return;
  const dataDir = currentTopic.dataFile.replace('.json', '');
  try {
    const res = await fetch(`${dataDir}/${date}.json`);
    if (!res.ok) throw new Error();
    allData = [await res.json()];
    window._splitSelectedIdx = window._splitIndex.days.findIndex(d => d.date === date);
    currentDateIdx = 0;
    buildFilters(); renderContent();
  } catch {
    $content.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>加载失败</p></div>';
  }
}

// ===== Copy RSS =====
function copyRSS() {
  navigator.clipboard.writeText($rssUrl.textContent).then(() => {
    const btn = document.querySelector('.copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ 已复制';
    btn.style.background = '#10b981';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1500);
  });
}

// ===== Search =====
let _searchTimer = null;
function debouncedSearch() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(onSearch, 200);
}
function onSearch() {
  searchQuery = $searchInput.value.trim().toLowerCase();
  renderContent();
}

// ===== Category filter =====
function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderContent();
}

// ===== Date navigation =====
function showDate(idx) {
  if (window._splitIndex) {
    // 拆分模式：idx 是索引中的日期下标
    const date = window._splitIndex.days[idx]?.date;
    if (date) {
      activeCategory = 'all'; searchQuery = '';
      $searchInput.value = '';
      $searchCount.textContent = '';
      loadDayFromSplit(date);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  } else {
    // 旧模式
    currentDateIdx = idx;
    activeCategory = 'all'; searchQuery = '';
    $searchInput.value = '';
    $searchCount.textContent = '';
    buildDateNav(); buildFilters(); renderContent();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function buildDateNav() {
  const nav = $nav;
  nav.innerHTML = '';

  // 拆分模式：从索引读取日期列表
  const dates = window._splitIndex
    ? window._splitIndex.days.map(d => d.date)
    : allData.map(d => d.date);

  const currentIdx = window._splitIndex
    ? (window._splitSelectedIdx ?? 0)
    : currentDateIdx;

  const RECENT = 5;
  const recentDates = dates.slice(0, RECENT);
  const olderDates = dates.slice(RECENT);

  recentDates.forEach((dateStr, i) => {
    const a = document.createElement('a');
    a.href = '#'; a.textContent = dateStr;
    if (i === currentIdx) a.className = 'active';
    a.onclick = e => { e.preventDefault(); showDate(i); };
    nav.appendChild(a);
  });

  if (olderDates.length > 0) {
    const more = document.createElement('div');
    more.className = 'nav-more';
    const btn = document.createElement('button');
    btn.className = 'nav-more-btn';
    const isOlderActive = currentIdx >= RECENT;
    btn.innerHTML = isOlderActive ? `${dates[currentIdx]} ▾` : '更早 ▾';
    if (isOlderActive) btn.style.borderColor = 'var(--accent)';
    more.appendChild(btn);
    const dropdown = document.createElement('div');
    dropdown.className = 'nav-dropdown';
    olderDates.forEach((dateStr, i) => {
      const a = document.createElement('a');
      a.href = '#'; a.textContent = dateStr;
      if (RECENT + i === currentIdx) a.className = 'active';
      a.onclick = e => { e.preventDefault(); showDate(RECENT + i); };
      dropdown.appendChild(a);
    });
    more.appendChild(dropdown);
    nav.appendChild(more);
  }
}

// ===== Filters =====
function buildFilters() {
  const el = $filters;
  const day = allData[currentDateIdx];
  if (!day) { el.innerHTML = ''; return; }
  el.innerHTML = `<button class="filter-btn active" data-cat="all" onclick="setCategory('all')">全部</button>` +
    day.sections.map(s => `<button class="filter-btn" data-cat="${s.title}" onclick="setCategory('${s.title}')">${s.icon} ${s.title}</button>`).join('');
  activeCategory = 'all';
}

// ===== Render =====
function renderContent() {
  const day = allData[currentDateIdx];
  if (!day) {
    $content.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>暂无数据</p></div>';
    $searchCount.textContent = '';
    return;
  }

  let sections = day.sections;
  if (activeCategory !== 'all') sections = sections.filter(s => s.title === activeCategory);
  if (searchQuery) {
    sections = sections.map(s => ({
      ...s,
      items: s.items.filter(r => {
        const title = (typeof r === 'string' ? r : r.title || '').toLowerCase();
        const source = (typeof r === 'object' && r.source || '').toLowerCase();
        return title.includes(searchQuery) || source.includes(searchQuery);
      })
    })).filter(s => s.items.length > 0);
  }

  if (!sections.length) {
    const emptyMsg = searchQuery ? `未找到「${esc(searchQuery)}」相关的新闻` : '该分类暂无新闻';
    $content.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>${emptyMsg}</p></div>`;
    $searchCount.textContent = '';
    return;
  }

  let total = 0;
  const single = activeCategory !== 'all';
  let html = `<div class="${single ? 'cards-full' : 'cards-grid'}">`;
  sections.forEach((s, si) => {
    total += s.items.length;
    const lc = single ? 'news-list news-grid' : 'news-list';
    html += `<div class="card" style="animation-delay:${si * .04}s"><h3>${s.icon} ${s.title} <span class="count">${s.items.length} 条</span></h3><ul class="${lc}">`;
    s.items.forEach(raw => {
      const item = typeof raw === 'string' ? { title: raw, link: '', source: '', titleEN: '' } : raw;
      const link = item.link
        ? `<a href="${esc(item.link)}" target="_blank" rel="noopener noreferrer">${highlightMatch(item.title)}</a>`
        : `<span>${highlightMatch(item.title)}</span>`;
      const src = item.source ? `<span class="source-tag">${esc(item.source)}</span>` : '';
      html += `<li class="news-item"><div>${link}${src}</div></li>`;
    });
    html += `</ul></div>`;
  });
  html += '</div>';
  $content.innerHTML = html;
  $searchCount.textContent = searchQuery ? `${total} 条结果` : '';
}

// ===== Helpers =====
const _escEl = document.createElement('div');
function esc(s) { _escEl.textContent = s; return _escEl.innerHTML; }

// ===== DOM refs (cached) =====
const $ = id => document.getElementById(id);
const $content = $('content');
const $nav = $('nav');
const $filters = $('filters');
const $searchInput = $('searchInput');
const $searchCount = $('searchCount');
const $rssUrl = $('rss-url');
const $rssLink = $('rssLink');
const $topicTabs = $('topicTabs');

function highlightMatch(text) {
  if (!searchQuery) return esc(text);
  const escaped = esc(text);
  const regex = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escaped.replace(regex, '<mark style="background:var(--accent-glow);color:var(--accent);padding:0 2px;border-radius:2px">$1</mark>');
}

// ===== Back to top =====
const backTop = $('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

// ===== Keyboard shortcuts =====
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    $searchInput.focus();
  }
  if (e.key === 'Escape') {
    const input = $searchInput;
    if (document.activeElement === input) {
      input.value = ''; input.blur();
      searchQuery = '';
      $searchCount.textContent = '';
      renderContent();
    }
  }
  if (document.activeElement.tagName !== 'INPUT') {
    const maxIdx = window._splitIndex ? window._splitIndex.days.length - 1 : allData.length - 1;
    const curIdx = window._splitIndex ? (window._splitSelectedIdx ?? 0) : currentDateIdx;
    if (e.key === 'ArrowLeft' && curIdx < maxIdx) { showDate(curIdx + 1); }
    if (e.key === 'ArrowRight' && curIdx > 0) { showDate(curIdx - 1); }
  }
});

// ===== Init =====
buildTopicTabs();
const feedUrl = 'https://holipay.github.io/xiaomi-daily-news/' + currentTopic.feedFile;
$rssUrl.textContent = feedUrl;
$rssLink.href = feedUrl;
loadData();
</script>
</body>
</html>

name: Daily News Update

on:
  schedule:
  # 每3天 UTC 0:00（东八区 8:00）运行：每月 1,4,7,10,13,16,19,22,25,28 日
  - cron: '0 0 1,4,7,10,13,16,19,22,25,28 * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch and update news
        env:
          TZ: Asia/Shanghai
        run: node .github/scripts/update-news.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ feed.xml .github/scripts/translations-cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📰 更新新闻资讯 $(date +%Y-%m-%d)"
            git push
          fi
